<!DOCTYPE html>
<html>
<head>
    <title>Archive</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .badge-archived { background: #198754; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Archived Tasks</h2>
        <a href="/" class="btn btn-secondary mb-3">← Back to Dashboard</a>
        
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th><th>Title</th><th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <td>{{ task.id }}</td>
                    <td><strong>{{ task.title }}</strong><br><small>{{ task.description or "" }}</small></td>
                    <td><span class="badge-archived">Archived</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
